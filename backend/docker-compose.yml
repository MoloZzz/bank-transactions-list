services:
  postgres:
    image: postgres:16-alpine
    container_name: txn_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transactions
    ports:
      - '5432:5432'
    volumes:
      - txn_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  txn_pgdata:
# DATABASE_URL must match the credentials above, e.g.:
# postgres://postgres:postgres@localhost:5432/transactions
